<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>导航页面</title>
    <style>
        /* 这里的代码用来给网页加版权，不用管它 */
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .menu { background: #333; padding: 10px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .menu a, .dropdown-label { color: white; text-decoration: none; padding: 10px 20px; background: #444; border-radius: 4px; display: block; cursor: pointer; }
        .menu a:hover, .dropdown:hover .dropdown-label { background: #666; }
        .menu a.active, .dropdown.active .dropdown-label { background: #1677ff; }
        .dropdown { position: relative; }
        .submenu { display: none; position: absolute; top: 42px; left: 0; min-width: 150px; background: #333; border-radius: 4px; padding: 6px; z-index: 10; box-shadow: 0 6px 18px rgba(0,0,0,.18); }
        .dropdown.open .submenu { display: block; }
        .submenu a { margin: 0; white-space: nowrap; }
        .submenu a + a { margin-top: 6px; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="menu">
    <a class="active" href="旧的外协配置.html" target="content">旧的外协配置</a>
    <a href="财务核对.html" target="content">财务核对</a>
    <div class="dropdown">
        <span class="dropdown-label">saas设计</span>
        <div class="submenu">
            <a href="运营端.html" target="content">运营端</a>
            <a href="租户后台.html" target="content">租户后台</a>
        </div>
    </div>
</div>

<iframe name="content" src="旧的外协配置.html"></iframe>

<script>
    document.querySelectorAll('.menu a').forEach(function (tab) {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.menu a').forEach(function (item) {
                item.classList.remove('active');
            });
            document.querySelectorAll('.dropdown').forEach(function (item) {
                item.classList.remove('active');
            });
            tab.classList.add('active');
            var dropdown = tab.closest('.dropdown');
            if (dropdown) {
                dropdown.classList.add('active');
            }
        });
    });

    document.querySelectorAll('.dropdown-label').forEach(function (label) {
        label.addEventListener('click', function (event) {
            event.stopPropagation();
            var dropdown = label.closest('.dropdown');
            document.querySelectorAll('.dropdown').forEach(function (item) {
                if (item !== dropdown) {
                    item.classList.remove('open');
                    item.classList.remove('active');
                }
            });
            dropdown.classList.toggle('open');
            dropdown.classList.toggle('active', dropdown.classList.contains('open'));
        });
    });

    document.addEventListener('click', function () {
        document.querySelectorAll('.dropdown').forEach(function (item) {
            item.classList.remove('open');
        });
    });
</script>

</body>
</html>
