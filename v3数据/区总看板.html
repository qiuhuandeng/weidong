<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>贝颜区总看板</title>
  <style>
    /* ==========================================
       1. 极致性能基础重置 & 系统原生高品质字体
       ========================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; /* 消除移动端点击蓝色高亮 */
      outline: none;
    }
    html, body {
      margin: 0;
      padding: 0;
      /* 采用原生苹果与安卓系统高品质无网络开销字体栈 */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    button {
      font: inherit;
      border: 0;
      background: none;
      cursor: pointer;
      color: inherit;
      padding: 0;
    }
    svg {
      display: block;
      flex-shrink: 0;
    }

    /* 整体布局框架 */
    .app {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: #f3f4f6;
    }
    .phone {
      width: 100%;
      max-width: 28rem;
      background: #F4F6F9;
      position: relative;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,.08), 0 8px 10px -6px rgba(0,0,0,.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ==========================================
       2. 顶部Topbar
       ========================================== */
    .topbar {
      background: #fff;
      padding: 0.85rem 0.85rem 0.65rem;
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.03);
      z-index: 20;
    }
    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .65rem;
    }
    .time-filters {
      display: flex;
      gap: .5rem;
      overflow-x: auto;
    }
    .time-filters::-webkit-scrollbar {
      display: none;
    }
    .time-filters {
      -ms-overflow-style: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tf-btn {
      white-space: nowrap;
      padding: .375rem .95rem;
      border-radius: 9999px;
      font-size: 13px;
      background: #f3f4f6;
      color: #4b5563;
      transition: background 0.12s, color 0.12s;
    }
    .tf-btn.active {
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 2px 4px rgba(37,99,235,.15);
    }
    .area-name {
      display: flex;
      align-items: center;
      color: #1f2937;
      font-size: 13.5px;
      font-weight: 700;
      padding-left: .5rem;
      flex-shrink: 0;
      cursor: pointer;
    }
    .page-title {
      font-size: 16px;
      font-weight: 800;
      color: #1f2937;
      margin: 0;
    }

    /* ==========================================
       3. 核心滚动内容区域
       ========================================== */
    .content {
      padding: 0.75rem .75rem 5.5rem;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .tip {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #9ca3af;
      margin-top: .15rem;
    }

    /* ==========================================
       4. 区域大盘概览卡片
       ========================================== */
    .card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.01), 0 1px 2px rgba(0,0,0,.03);
      padding: 1.15rem;
      border: 1px solid rgba(243,244,246,.8);
    }
    .card-title {
      font-size: 15px;
      font-weight: 800;
      color: #1f2937;
      display: flex;
      align-items: center;
      margin: 0 0 1rem;
    }
    .overview-banner {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: .75rem;
      padding: 1rem;
      color: #fff;
      box-shadow: 0 4px 12px rgba(37,99,235,.25);
      margin-bottom: .75rem;
    }
    .overview-banner .lbl {
      font-size: 11.5px;
      color: #dbeafe;
      opacity: .95;
      margin-bottom: .25rem;
    }
    .overview-banner .val {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -.03em;
      line-height: 1.1;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    .overview-cell {
      background: #f8fafc;
      border-radius: .75rem;
      padding: .75rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid #f1f5f9;
    }
    .overview-cell .lbl {
      font-size: 11px;
      color: #64748b;
      margin-bottom: .25rem;
      display: flex;
      align-items: center;
    }
    .overview-cell .val {
      font-size: 17px;
      font-weight: 800;
      color: #1e293b;
    }

    /* ==========================================
       5. 门店比拼工具栏与排序下拉
       ========================================== */
    .role-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 .25rem;
      margin: .25rem 0 .5rem;
      gap: .5rem;
      position: relative;
    }
    .role-title {
      font-size: 15px;
      font-weight: 800;
      color: #1f2937;
      display: flex;
      align-items: center;
      margin: 0;
      flex-shrink: 0;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: .4rem;
      flex-wrap: nowrap;
    }
    .sort-wrap {
      position: relative;
    }
    .sort-btn {
      font-size: 11px;
      background: #fff;
      border: 1px solid #e5e7eb;
      padding: .35rem .6rem;
      border-radius: .375rem;
      color: #4b5563;
      display: flex;
      align-items: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
      transition: background 0.1s;
      white-space: nowrap;
    }
    .sort-btn:active {
      background: #f9fafb;
    }
    
    .sort-overlay {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
    }
    .sort-overlay.active {
      display: block;
    }
    
    .sort-menu {
      position: absolute;
      right: 0;
      margin-top: .35rem;
      width: 8rem;
      background: #fff;
      border-radius: .5rem;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
      border: 1px solid #f3f4f6;
      z-index: 30;
      padding: .25rem 0;
      display: none;
      transform-origin: top right;
      animation: popIn 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sort-menu.active {
      display: block;
    }
    .sort-menu.tall {
      max-height: 15rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @keyframes popIn {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .sort-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: .55rem .75rem;
      font-size: 12px;
      color: #4b5563;
      transition: background 0.1s;
    }
    .sort-item:active {
      background: #f9fafb;
    }
    .sort-item.active {
      color: #2563eb;
      background: #eff6ff;
      font-weight: 700;
    }

    /* ==========================================
       6. 门店排行榜卡片
       ========================================== */
    .store-list {
      display: flex;
      flex-direction: column;
      gap: .75rem;
      position: relative;
    }
    .store {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.02);
      border: 1px solid #f3f4f6;
      padding: .85rem;
      position: relative;
      overflow: hidden;
    }
    .store-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }
    .store-line.g { background: #fbbf24; }
    .store-line.s { background: #d1d5db; }
    .store-line.b { background: #fdba74; }
    
    .store-inner {
      padding-left: .5rem;
    }
    .store-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
    }
    .store-left {
      display: flex;
      align-items: center;
    }
    .store-rank {
      font-size: 13px;
      font-weight: 900;
      width: 1.25rem;
      flex-shrink: 0;
      color: #d1d5db;
    }
    .store-rank.g { color: #f59e0b; }
    .store-rank.s { color: #9ca3af; }
    .store-rank.b { color: #fb923c; }
    .store-name {
      font-weight: 700;
      color: #1f2937;
      font-size: 15px;
    }
    
    .store-main {
      text-align: right;
    }
    .store-main .lbl {
      font-size: 10px;
      line-height: 1;
      margin-bottom: .25rem;
      color: #9ca3af;
    }
    .store-main .lbl.hl {
      color: #3b82f6;
      font-weight: 700;
    }
    .store-main .val {
      font-weight: 900;
      font-size: 16px;
      line-height: 1;
      color: #1f2937;
    }
    .store-main .val.hl {
      color: #2563eb;
    }

    .store-grid-wrap {
      background: rgba(249,250,251,.7);
      border-radius: .75rem;
      padding: .625rem;
    }
    .store-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .6rem .3rem;
    }
    .store-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fff;
      border-radius: .375rem;
      padding: .35rem .125rem;
      border: 1px solid rgba(243,244,246,.7);
    }
    .store-metric .lbl {
      font-size: 9px;
      margin-bottom: .25rem;
      white-space: nowrap;
      transform: scale(.93);
      color: #9ca3af;
    }
    .store-metric .lbl.hl {
      color: #3b82f6;
      font-weight: 700;
    }
    .store-metric .val {
      font-size: 11.5px;
      font-weight: 700;
      color: #374151;
    }
    .store-metric .val.hl {
      color: #2563eb;
    }
    
    .store-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .75rem;
      padding: .5rem .25rem 0;
      border-top: 1px solid #f1f3f5;
    }
    .store-progress .lbl {
      font-size: 10px;
      color: #9ca3af;
    }
    .store-progress .lbl.hl {
      color: #3b82f6;
      font-weight: 700;
    }
    .store-progress .right {
      display: flex;
      align-items: center;
      width: 55%;
    }
    .store-progress .bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
      margin-right: .5rem;
    }
    .store-progress .bar-fill {
      height: 100%;
      background: #34d399;
    }
    .store-progress .val {
      font-size: 11px;
      font-weight: 700;
      color: #374151;
    }
    .store-progress .val.hl {
      color: #2563eb;
    }

    /* ==========================================
       7. 底部导航 Tabbar
       ========================================== */
    .bottombar {
      position: absolute;
      bottom: 0;
      width: 100%;
      max-width: 28rem;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-around;
      padding: .5rem .5rem 1.5rem;
      font-size: 10px;
      color: #9ca3af;
      z-index: 15;
    }
    .bnav {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
    }
    .bnav .dot {
      width: 1.35rem;
      height: 1.35rem;
      background: #f3f4f6;
      border-radius: 9999px;
      margin-bottom: .25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bnav.active {
      color: #2563eb;
    }
    .bnav.active .dot {
      background: #eff6ff;
    }
    .badge {
      position: absolute;
      top: -.25rem;
      right: -.5rem;
      background: #ef4444;
      color: #fff;
      font-size: 9px;
      padding: 0 .25rem;
      border-radius: 9999px;
      transform: scale(.85);
      font-weight: bold;
    }

    /* ==========================================
       8. 精致大区选择底部抽屉 BottomSheet
       ========================================== */
    .drawer-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 25;
      opacity: 0;
      visibility: hidden;
      will-change: opacity, visibility;
      transition: opacity 0.22s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.22s;
      backdrop-filter: blur(1.5px);
    }
    .drawer-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .drawer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top-left-radius: 1.25rem;
      border-top-right-radius: 1.25rem;
      z-index: 30;
      padding: 1.25rem 1rem 1.6rem;
      will-change: transform;
      backface-visibility: hidden;
      transform: translate3d(0, 100%, 0);
      transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      box-shadow: 0 -8px 24px rgba(0,0,0,0.08);
    }
    .drawer.active {
      transform: translate3d(0, 0, 0);
    }
    .drawer-handle {
      width: 36px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 9999px;
      margin: 0 auto 1.15rem;
    }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .drawer-title {
      font-size: 15px;
      font-weight: 800;
      color: #1f2937;
    }
    .drawer-close {
      background: #f3f4f6;
      border: none;
      border-radius: 9999px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    .detail-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      max-height: 40vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .store-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.95rem 0.5rem;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
    }
    .store-list-item:last-child {
      border-bottom: none;
    }
    .store-list-item .name {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }
    .store-list-item.selected .name {
      color: #2563eb;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="phone">
    
    <!-- 1. 顶部 Tabbar 导航栏 -->
    <div class="topbar">
      <div class="topbar-row">
        <div class="time-filters" id="timeFilters">
          <button class="tf-btn" data-id="today">今天</button>
          <button class="tf-btn" data-id="yesterday">昨天</button>
          <button class="tf-btn active" data-id="month">本月</button>
          <button class="tf-btn" data-id="lastMonth">上月</button>
          <button class="tf-btn">更多</button>
        </div>
        <div class="store-name" id="areaSelectTrigger">
          <span id="currentAreaLabel">云南大区</span>
          <!-- ChevronDown Icon -->
          <svg style="margin-left:.25rem" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9l6 6 6-6"></path>
          </svg>
        </div>
      </div>
      <div class="page-title">贝颜区总看板</div>
    </div>

    <!-- 2. 核心大盘展示区 -->
    <div class="content" id="contentArea">
      <div class="stack">
        
        <!-- 更新提示 -->
        <div class="tip">
          <!-- Info Icon -->
          <svg style="margin-right:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          区域数据汇总，采用T+1规则，截至昨日
        </div>

        <!-- 区域数据大盘 -->
        <div class="card">
          <h2 class="card-title">
            <!-- TrendingUp Icon -->
            <svg style="margin-right:.375rem" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
              <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
            区域概览
          </h2>
          <div class="overview-banner">
            <div class="lbl">大区总业绩</div>
            <div class="val" id="totalRevenueVal">¥0</div>
          </div>
          <div class="overview-grid">
            <div class="overview-cell">
              <div class="lbl">
                <!-- Target Icon (Red/Orange) -->
                <svg style="margin-right:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5">
                  <circle cx="12" cy="12" r="10"></circle>
                  <circle cx="12" cy="12" r="6"></circle>
                  <circle cx="12" cy="12" r="2"></circle>
                </svg>
                预约贡献
              </div>
              <div class="val" id="apptContributionVal">¥0</div>
            </div>
            <div class="overview-cell">
              <div class="lbl">
                <!-- Users Icon (Blue) -->
                <svg style="margin-right:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                核算预约
              </div>
              <div class="val" id="arrivalRateVal">0%</div>
            </div>
          </div>
        </div>

        <!-- 门店比拼板块 -->
        <div>
          <div class="role-head">
            <h2 class="role-title">
              <!-- Building Icon -->
              <svg style="margin-right:.375rem" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2.5">
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                <path d="M9 22v-4h6v4"></path>
                <path d="M8 6h.01"></path>
                <path d="M16 6h.01"></path>
                <path d="M12 6h.01"></path>
                <path d="M12 10h.01"></path>
                <path d="M12 14h.01"></path>
                <path d="M16 10h.01"></path>
                <path d="M16 14h.01"></path>
                <path d="M8 10h.01"></path>
                <path d="M8 14h.01"></path>
              </svg>
              门店比拼
            </h2>
            <div class="toolbar-right">
              
              <!-- 1. 区域选择器下拉 -->
              <div class="sort-wrap">
                <button class="sort-btn" id="areaDropdownBtn">
                  区域：梦玲区域
                  <svg style="margin-left:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M6 9l6 6 6-6"></path>
                  </svg>
                </button>
                <div class="sort-overlay" id="areaSortOverlay"></div>
                <div class="sort-menu" id="areaSortMenu">
                  <button class="sort-item active" data-area="menglin">梦玲区域</button>
                  <button class="sort-item" data-area="xiaohui">小慧区域</button>
                </div>
              </div>

              <!-- 2. 排序筛选下拉 -->
              <div class="sort-wrap">
                <button class="sort-btn" id="sortDropdownBtn">
                  按总业绩
                  <svg style="margin-left:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M6 9l6 6 6-6"></path>
                  </svg>
                </button>
                <div class="sort-overlay" id="metricSortOverlay"></div>
                <div class="sort-menu tall" id="metricSortMenu">
                  <!-- 动态插入排序字段 -->
                </div>
              </div>

            </div>
          </div>

          <!-- 门店动态渲染列表 -->
          <div class="store-list" id="storeListContainer">
            <!-- JS 极速注入 -->
          </div>
        </div>

      </div>
    </div>

    <!-- 3. 底部主 Tab 导航 -->
    <div class="bottombar">
      <div class="bnav">
        <div class="dot"></div>
        <span>大区管理</span>
      </div>
      <div class="bnav">
        <div class="dot"></div>
        <span>排行榜</span>
      </div>
      <div class="bnav">
        <div class="badge">99+</div>
        <div class="dot"></div>
        <span>工作台</span>
      </div>
      <div class="bnav active">
        <div class="dot">
          <!-- PieChart Icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
            <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
          </svg>
        </div>
        <span>数据</span>
      </div>
      <div class="bnav">
        <div class="dot"></div>
        <span>我的</span>
      </div>
    </div>

    <!-- ==========================================
         4. 大区切换器底部抽屉 (Modal BottomSheet)
         ========================================== -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="storeSelectDrawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <span class="drawer-title">选择大区</span>
        <button class="drawer-close" id="storeDrawerClose" aria-label="关闭">&times;</button>
      </div>
      <div class="detail-list" id="storeListContainerDrawer">
        <!-- 动态生成大区列表 -->
      </div>
    </div>

  </div>
</div>

<!-- ==========================================
     5. 极致精简高性能原生 Vanilla JS 逻辑
     ========================================== -->
<script>
  (function() {
    // 数据配置：多区大盘 (还原高拟真校准数据，以实现与图片100%相符的汇总)
    const STORES_DATA = {
      menglin: [
        { id: 1, name: '昆明五华店', total: '13,900,000', yygx: '2,900', hc_in: '4,500', kd_in: '3,510', kd_ra: '80%', avg_order: '3,675', avg_order_new: '2,000', wf_in: '1,500,000', avg_order_dz: '3,500', f_ra: '81%' },
        { id: 2, name: '昆明盘龙店', total: '10,850,000', yygx: '2,850', hc_in: '3,600', kd_in: '2,700', kd_ra: '78%', avg_order: '3,648', avg_order_new: '1,950', wf_in: '1,200,000', avg_order_dz: '3,400', f_ra: '78%' },
        { id: 3, name: '曲靖麒麟店', total: '9,500,000',  yygx: '2,800', hc_in: '3,200', kd_in: '2,336', kd_ra: '76%', avg_order: '3,638', avg_order_new: '1,800', wf_in: '900,000',   avg_order_dz: '3,300', f_ra: '75%' },
        { id: 4, name: '玉溪红塔店', total: '8,200,000',  yygx: '2,820', hc_in: '2,800', kd_in: '2,016', kd_ra: '75%', avg_order: '3,571', avg_order_new: '1,750', wf_in: '750,000',   avg_order_dz: '3,200', f_ra: '72%' },
        { id: 5, name: '大理下关店', total: '6,050,000',  yygx: '2,880', hc_in: '2,600', kd_in: '1,820', kd_ra: '73.5%', avg_order: '3,571', avg_order_new: '1,600', wf_in: '600,000',   avg_order_dz: '3,100', f_ra: '68%' },
      ],
      xiaohui: [
        { id: 6, name: '丽江古城店', total: '11,200,000', yygx: '2,450', hc_in: '4,100', kd_in: '3,100', kd_ra: '75%', avg_order: '3,612', avg_order_new: '1,850', wf_in: '1,100,000', avg_order_dz: '3,350', f_ra: '76%' },
        { id: 7, name: '腾冲和顺店', total: '8,900,000',  yygx: '2,310', hc_in: '3,300', kd_in: '2,400', kd_ra: '72%', avg_order: '3,550', avg_order_new: '1,700', wf_in: '850,000',   avg_order_dz: '3,250', f_ra: '74%' },
        { id: 8, name: '普洱思茅店', total: '7,600,000',  yygx: '2,180', hc_in: '2,900', kd_in: '2,050', kd_ra: '70%', avg_order: '3,520', avg_order_new: '1,650', wf_in: '700,000',   avg_order_dz: '3,150', f_ra: '71%' },
        { id: 9, name: '临沧临翔店', total: '6,900,000',  yygx: '2,050', hc_in: '2,500', kd_in: '1,700', kd_ra: '68%', avg_order: '3,480', avg_order_new: '1,580', wf_in: '550,000',   avg_order_dz: '3,050', f_ra: '67%' },
        { id: 10, name: '昭通昭阳店', total: '5,800,000', yygx: '1,920', hc_in: '2,100', kd_in: '1,400', kd_ra: '66%', avg_order: '3,410', avg_order_new: '1,500', wf_in: '400,000',   avg_order_dz: '2,950', f_ra: '63%' },
      ]
    };

    const SORT_OPTIONS = [
      { key: 'total',         label: '总业绩' },
      { key: 'yygx',          label: '预约贡献' },
      { key: 'hc_in',         label: '核算预约' },
      { key: 'kd_in',         label: '核算到店' },
      { key: 'kd_ra',         label: '到店率' },
      { key: 'avg_order',     label: '核算均客单' },
      { key: 'avg_order_new', label: '核算新客单' },
      { key: 'wf_in',         label: 'Y10业绩' },
      { key: 'avg_order_dz',  label: '主营均客单' },
      { key: 'f_ra',          label: '老客业绩占比', isProgress: true },
    ];

    const STORES = ['云南大区', '四川大区', '贵州大区'];

    // 状态机 (State)
    let currentArea = '云南大区';
    let currentRegion = 'menglin'; // 'menglin' | 'xiaohui'
    let currentSortKey = 'total';
    let currentTimeFilter = 'month';

    // DOM 元素缓存
    const DOM = {
      timeFilters: document.getElementById('timeFilters'),
      currentAreaLabel: document.getElementById('currentAreaLabel'),
      areaSelectTrigger: document.getElementById('areaSelectTrigger'),
      storeListContainer: document.getElementById('storeListContainer'),
      
      // 数据卡片
      totalRevenueVal: document.getElementById('totalRevenueVal'),
      apptContributionVal: document.getElementById('apptContributionVal'),
      arrivalRateVal: document.getElementById('arrivalRateVal'),

      // 区域筛选 & 排序
      areaDropdownBtn: document.getElementById('areaDropdownBtn'),
      areaSortOverlay: document.getElementById('areaSortOverlay'),
      areaSortMenu: document.getElementById('areaSortMenu'),
      sortDropdownBtn: document.getElementById('sortDropdownBtn'),
      metricSortOverlay: document.getElementById('metricSortOverlay'),
      metricSortMenu: document.getElementById('metricSortMenu'),

      // 底部抽屉大区
      drawerOverlay: document.getElementById('drawerOverlay'),
      storeSelectDrawer: document.getElementById('storeSelectDrawer'),
      storeDrawerClose: document.getElementById('storeDrawerClose'),
      storeListContainerDrawer: document.getElementById('storeListContainerDrawer')
    };

    /* ==========================================
       通用转换函数 (Helper Utilities)
       ========================================== */
    function formatNumber(num) {
      return Math.round(num).toLocaleString('zh-CN');
    }

    function parseVal(v) {
      if (typeof v === 'number') return v;
      return parseFloat(v.replace(/,/g, '').replace('%', '')) || 0;
    }

    // 根据选中的时间段，对模拟数据执行等比重算，提供无缝互动。
    function getScaleRatio() {
      switch (currentTimeFilter) {
        case 'today': return 0.025;
        case 'yesterday': return 0.035;
        case 'lastMonth': return 1.15;
        case 'month':
        default: return 1.0;
      }
    }

    /* ==========================================
       初始化排序下拉菜单 (Render Sort Options)
       ========================================== */
    function initSortMenu() {
      DOM.metricSortMenu.innerHTML = SORT_OPTIONS.map(opt => `
        <button class="sort-item ${currentSortKey === opt.key ? 'active' : ''}" data-key="${opt.key}">
          ${opt.label}
        </button>
      `).join('');
    }

    /* ==========================================
       自适应核心渲染逻辑 (Core Render Loop)
       ========================================== */
    function updateDashboard() {
      const ratio = getScaleRatio();
      const rawStores = STORES_DATA[currentRegion];

      // 1. 等比微调生成当前选定时段的临时数据
      const stores = rawStores.map(store => {
        const totalNum = parseVal(store.total) * ratio;
        const yygxNum = parseVal(store.yygx) * ratio;
        const hcInNum = parseVal(store.hc_in) * ratio;
        const kdInNum = parseVal(store.kd_in) * ratio;
        const wfInNum = parseVal(store.wf_in) * ratio;

        return {
          ...store,
          total: formatNumber(totalNum),
          yygx: formatNumber(yygxNum),
          hc_in: formatNumber(hcInNum),
          kd_in: formatNumber(kdInNum),
          wf_in: formatNumber(wfInNum),
        };
      });

      // 2. 统计计算区域汇总概盘
      let regionTotal = 0;
      let regionApptSum = 0;
      let totalRate = 0;

      stores.forEach(s => {
        regionTotal += parseVal(s.total);
        regionApptSum += parseVal(s.yygx);
        totalRate += parseVal(s.kd_ra);
      });

      const avgAppt = regionApptSum / stores.length;
      const avgArrivalRate = (totalRate / stores.length).toFixed(1) + '%';

      DOM.totalRevenueVal.textContent = '¥' + formatNumber(regionTotal);
      DOM.apptContributionVal.textContent = '¥' + formatNumber(avgAppt);
      DOM.arrivalRateVal.textContent = avgArrivalRate;

      // 3. 执行排序
      stores.sort((a, b) => parseVal(b[currentSortKey]) - parseVal(a[currentSortKey]));

      // 4. 开始重绘门店列表 DOM
      const mainMetric = SORT_OPTIONS[0];
      const progressMetric = SORT_OPTIONS.find(o => o.isProgress);
      const gridMetrics = SORT_OPTIONS.filter(o => o.key !== mainMetric.key && !o.isProgress);

      const html = stores.map((s, index) => {
        // 前三名荣誉渐变侧边线
        let lineClass = 'store-line';
        let rankClass = 'store-rank';
        if (index === 0) { lineClass += ' g'; rankClass += ' g'; }
        else if (index === 1) { lineClass += ' s'; rankClass += ' s'; }
        else if (index === 2) { lineClass += ' b'; rankClass += ' b'; }

        return `
          <div class="store">
            <div class="${lineClass}"></div>
            <div class="store-inner">
              <div class="store-head">
                <div class="store-left">
                  <span class="${rankClass}">${index + 1}</span>
                  <span class="store-name">${s.name}</span>
                </div>
                <div class="store-main">
                  <div class="lbl ${currentSortKey === mainMetric.key ? 'hl' : ''}">${mainMetric.label}</div>
                  <div class="val ${currentSortKey === mainMetric.key ? 'hl' : ''}">¥${s[mainMetric.key]}</div>
                </div>
              </div>
              <div class="store-grid-wrap">
                <div class="store-grid">
                  ${gridMetrics.map(m => `
                    <div class="store-metric">
                      <span class="lbl ${currentSortKey === m.key ? 'hl' : ''}">${m.label}</span>
                      <span class="val ${currentSortByFormat(m.key, s[m.key])}">${s[m.key]}</span>
                    </div>
                  `).join('')}
                </div>
                ${progressMetric ? `
                  <div class="store-progress">
                    <span class="lbl ${currentSortKey === progressMetric.key ? 'hl' : ''}">${progressMetric.label}</span>
                    <div class="right">
                      <div class="bar">
                        <div class="bar-fill" style="width: ${s[progressMetric.key]};"></div>
                      </div>
                      <span class="val ${currentSortKey === progressMetric.key ? 'hl' : ''}">${s[progressMetric.key]}</span>
                    </div>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');

      DOM.storeListContainer.innerHTML = html;
    }

    function currentSortByFormat(key, value) {
      let extraClass = '';
      if (currentSortKey === key) extraClass = 'hl';
      return extraClass;
    }

    /* ==========================================
       交互事件绑定 (UI Interactions)
       ========================================== */
       
    // 时间切换器
    DOM.timeFilters.addEventListener('click', (e) => {
      const btn = e.target.closest('.tf-btn');
      if (!btn || !btn.dataset.id) return;
      
      DOM.timeFilters.querySelector('.tf-btn.active').classList.remove('active');
      btn.classList.add('active');
      currentTimeFilter = btn.dataset.id;
      
      updateDashboard();
    });

    // 区域及排序下拉菜单切换 (无卡顿)
    DOM.areaDropdownBtn.addEventListener('click', () => {
      DOM.areaSortOverlay.classList.toggle('active');
      DOM.areaSortMenu.classList.toggle('active');
    }, { passive: true });

    DOM.areaSortOverlay.addEventListener('click', () => {
      DOM.areaSortOverlay.classList.remove('active');
      DOM.areaSortMenu.classList.remove('active');
    }, { passive: true });

    DOM.areaSortMenu.addEventListener('click', (e) => {
      const btn = e.target.closest('.sort-item');
      if (!btn) return;
      
      DOM.areaSortMenu.querySelector('.sort-item.active').classList.remove('active');
      btn.classList.add('active');
      
      currentRegion = btn.dataset.area;
      DOM.areaDropdownBtn.innerHTML = `
        区域：${btn.textContent.trim()}
        <svg style="margin-left:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      `;
      
      DOM.areaSortOverlay.classList.remove('active');
      DOM.areaSortMenu.classList.remove('active');
      
      updateDashboard();
    });

    // 排序按钮及面板控制
    DOM.sortDropdownBtn.addEventListener('click', () => {
      DOM.metricSortOverlay.classList.toggle('active');
      DOM.metricSortMenu.classList.toggle('active');
    }, { passive: true });

    DOM.metricSortOverlay.addEventListener('click', () => {
      DOM.metricSortOverlay.classList.remove('active');
      DOM.metricSortMenu.classList.remove('active');
    }, { passive: true });

    DOM.metricSortMenu.addEventListener('click', (e) => {
      const btn = e.target.closest('.sort-item');
      if (!btn) return;

      DOM.metricSortMenu.querySelector('.sort-item.active').classList.remove('active');
      btn.classList.add('active');

      currentSortKey = btn.dataset.key;
      DOM.sortDropdownBtn.innerHTML = `
        按${btn.textContent.trim()}
        <svg style="margin-left:.25rem" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      `;

      DOM.metricSortOverlay.classList.remove('active');
      DOM.metricSortMenu.classList.remove('active');

      updateDashboard();
    });

    /* ==========================================
       大区选择底部抽屉 (Store Select Drawer)
       ========================================== */
    function openDrawer() {
      DOM.drawerOverlay.classList.add('active');
      DOM.storeSelectDrawer.classList.add('active');
      renderDrawerStoreList();
    }

    function closeDrawer() {
      DOM.drawerOverlay.classList.remove('active');
      DOM.storeSelectDrawer.classList.remove('active');
    }

    function renderDrawerStoreList() {
      DOM.storeListContainerDrawer.innerHTML = STORES.map(store => `
        <div class="store-list-item ${store === currentArea ? 'selected' : ''}" data-name="${store}">
          <span class="name">${store}</span>
          ${store === currentArea ? `
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="3">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          ` : ''}
        </div>
      `).join('');
    }

    DOM.areaSelectTrigger.addEventListener('click', openDrawer, { passive: true });
    DOM.drawerOverlay.addEventListener('click', closeDrawer, { passive: true });
    DOM.storeDrawerClose.addEventListener('click', closeDrawer, { passive: true });

    DOM.storeListContainerDrawer.addEventListener('click', (e) => {
      const item = e.target.closest('.store-list-item');
      if (!item) return;

      currentArea = item.dataset.name;
      DOM.currentAreaLabel.textContent = currentArea;
      
      closeDrawer();

      // 切换省份时轻微重整数据产生交互感
      const cells = document.querySelectorAll('.overview-cell .val, .overview-banner .val');
      cells.forEach(el => {
        el.style.opacity = '0.3';
        setTimeout(() => { el.style.opacity = '1'; }, 100);
      });
      updateDashboard();
    });

    // 页面运行初始化入口
    initSortMenu();
    updateDashboard();

  })();
</script>
</body>
</html>
