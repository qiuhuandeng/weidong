<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>导航页面</title>
    <style>
        /* 这里的代码用来给网页加版权，不用管它 */
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .menu { background: #333; padding: 10px; display: flex; justify-content: center; flex-wrap: wrap; align-items: center; }
        .menu a { color: white; text-decoration: none; padding: 10px 20px; margin: 0 5px; background: #444; border-radius: 4px; }
        .menu a:hover { background: #666; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }

        /* ==================== 修复并优化的“更多”下拉菜单样式 ==================== */
        /* 保持下拉容器作为 flex 子项，并清除默认块级间距 */
        .dropdown {
            position: relative;
            display: inline-block;
            margin: 0; /* 移除外边距，由内部 a 标签控制 */
        }

        /* 专门让“更多”这个按钮的样式与左边普通 a 标签完全一致 */
        .dropdown .dropbtn {
            display: inline-block;
            box-sizing: border-box;
        }

        /* 隐藏实际的下拉内容 */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #333; /* 保持和导航栏一致的深色背景 */
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 999; /* 提高层级，防止被 iframe 遮挡 */
            border-radius: 4px;
            margin-top: 2px; /* 紧贴上方导航按钮 */
            left: 5px; /* 稍微向右偏移，对齐按钮边缘 */
        }

        /* 下拉菜单里面的子链接样式 */
        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            margin: 5px;
            text-align: left;
            background: transparent; /* 下拉列表内默认透明背景 */
        }

        /* 鼠标悬停在下拉列表选项上时的背景变亮 */
        .dropdown-content a:hover {
            background-color: #666;
        }

        /* 当鼠标悬停在“更多”容器上时，显示下拉菜单内容 */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* 当下拉菜单激活时，“更多”按钮自身保持高亮 */
        .dropdown:hover .dropbtn {
            background-color: #666;
        }
        /* ================================================================ */
    </style>
</head>
<body>

<div class="menu">
    <a href="pc端床位设置.html" target="content">pc端床位设置</a>
    <a href="移动端床位设置.html" target="content">移动端床位设置</a>
    <a href="智能排客.html" target="content">智能排客</a>
 
    <div class="dropdown">
        <a href="javascript:void(0)" class="dropbtn">更多 ▾</a>
        <div class="dropdown-content">
            <a href="其他页面1.html" target="content">其他页面1</a>
            <a href="其他页面2.html" target="content">其他页面2</a>
            <a href="其他页面3.html" target="content">其他页面3</a>
        </div>
    </div>
</div>

<iframe name="content" src="pc端床位设置.html"></iframe>

</body>
</html>
